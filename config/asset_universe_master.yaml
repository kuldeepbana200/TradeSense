# -----------------------------------------------------------------------------
# SECTION B: MACRO MONITORING UNIVERSE (The Dashboard)
# -----------------------------------------------------------------------------
# Criteria: Global benchmarks representing major asset classes.
# Source: yfinance (Yahoo Finance)
# Logic: End-of-Day or 15m delayed ingestion. Used for correlation & regime detection.

macro_monitor:
  equities_us:
    - SPY      # S&P 500 (Risk Baseline)
    - QQQ      # Nasdaq 100 (Tech Correlation)
    - IWM      # Russell 2000 (Small Cap/Risk On)
    - NVDA     # AI Proxy (Leading Indicator)
    - MSTR     # Corp Bitcoin Proxy
    - COIN     # Crypto Exchange Proxy
    - VXX      # Volatility Index (Fear Gauge)
    
  equities_global:
    - EEM      # Emerging Markets
    - KWEB     # China Tech
    
  commodities:
    - GLD      # Gold (Inflation/Fear)
    - SLV      # Silver (High Beta Metal)
    - USO      # Oil (Growth/Inflation)
    - UNG      # Natural Gas
    - DBA      # Agriculture
    - CPER     # Copper (Economic Health)
    - LIT      # Lithium (Battery Tech)
    
  forex_rates:
    - UUP      # US Dollar Index (Bullish ETF)
    - FXE      # Euro Trust
    - FXY      # Japanese Yen Trust
    - TLT      # 20+ Year Treasury Bond
    - HYG      # High Yield Corp Bond (Junk)

  canaries:    # "Coal Mine" indicators for specific risks
    - USDT-USD # Tether Peg
    - USDC-USD # USDC Peg
    - ARKK     # Speculative Tech Sentiment
    - TSLA     # Retail Sentiment Leader

